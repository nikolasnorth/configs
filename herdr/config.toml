# herdr configuration
# See `herdr --default-config` for the full list of options.

[theme]
name = "catppuccin"

[terminal]
# new panes/tabs inherit cwd from the source pane/workspace
new_cwd = "follow"

[keys]
# matches tmux prefix (tmux/.tmux.conf)
prefix = "ctrl+space"

# pane navigation, matches tmux h/j/k/l
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"

# splits, matches tmux defaults: % = side-by-side, " = stacked
split_vertical = "prefix+%"
split_horizontal = "prefix+\""

# hunk: review-first diff viewer for agent-authored changesets (hunk.dev)
# via edmundmiller/herdr-plugin-hunk (`herdr plugin install`), opens in a
# new tab rather than a popup or split pane
[[keys.command]]
key = "prefix+d"
type = "plugin_action"
command = "hunk.diff.worktree-tab"

[[keys.command]]
key = "prefix+u"
type = "plugin_action"
command = "hunk.diff.branch-tab"

[[keys.command]]
key = "prefix+shift+s"
type = "plugin_action"
command = "hunk.diff.staged-tab"

[ui]
sidebar_width = 26
