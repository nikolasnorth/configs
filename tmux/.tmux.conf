# ── General ──────────────────────────────────────────────────

# prefix: ctrl + space
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# 256 color support
set -g default-terminal "tmux-256color"

# enable true color support and cursor shape passthrough
set -ga terminal-overrides ",xterm-ghostty:Tc:Ss=\\E[%p1%d q:Se=\\E[6 q"

# vim mode for copy mode
set -g mode-keys vi

# enable mouse (scroll, select panes, resize)
set -g mouse on

# scroll history
set-option -g history-limit 100000

# no escape delay (important for vim)
set -sg escape-time 0

# pass focus events to applications (needed for nvim autoread)
set -g focus-events on

# start indexing at 1 (easier to reach)
set -g base-index 1
setw -g pane-base-index 1

# renumber windows when one closes
set -g renumber-windows on

# activity alerts in background windows
set -g monitor-activity on
set -g visual-activity off

# ── Key Bindings ─────────────────────────────────────────────

# reload config: prefix + r
bind r source-file ~/.tmux.conf \; display "Reloaded"

# navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# splits in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Theme (gruvbox material dark) ───────────────────────────

# status bar
set -g status-position top
set -g status-style 'bg=#282828 fg=#d4be98'
set -g status-left-length 30
set -g status-right-length 80
set -g status-left '#[fg=#282828,bg=#a9b665,bold] #S #[default]   '
set -g status-right '#{?pane_in_mode,#[bg=#89b482 fg=#282828 bold] COPY ,#[bg=#504945 fg=#d4be98 bold] NORMAL }#[default] #[fg=#928374]UTC #(TZ="UTC" date +%%H:%%M)  YVR #(TZ="America/Vancouver" date +%%I:%%M%%p)  #[fg=#d4be98]YYZ #(TZ="America/Toronto" date +%%I:%%M%%p) '

# window tabs
set -g window-status-current-style 'bg=#89b482 fg=#282828 bold'
set -g window-status-current-format '  #I:#W  '
set -g window-status-style 'fg=#928374'
set -g window-status-format '  #I:#W  '
set -g window-status-separator '#[fg=#504945]│'
set -g window-status-activity-style 'fg=#d8a657'

# panes
set -g pane-border-style 'fg=#504945'
set -g pane-active-border-style 'fg=#89b482'
set -g window-style 'bg=#32302f'
set -g window-active-style 'bg=#282828'

# message/command bar
set -g message-style 'bg=#d8a657 fg=#282828 bold'

# copy mode selection highlight
set -g mode-style 'bg=#d8a657 fg=#282828'

# clock mode (prefix + t)
set -g clock-mode-colour '#89b482'
