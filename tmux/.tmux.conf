# ── General ──────────────────────────────────────────────────

# prefix: ctrl + space
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# 256 color support
set -g default-terminal "tmux-256color"

# enable true color support and cursor shape passthrough
set -ga terminal-overrides ",xterm-ghostty:Tc:Ss=\\E[%p1%d q:Se=\\E[6 q"

# vim mode for copy mode
set -g mode-keys vi

# enable mouse (scroll, select panes, resize)
set -g mouse on

# scroll history
set-option -g history-limit 100000

# no escape delay (important for vim)
set -sg escape-time 0

# pass focus events to applications (needed for nvim autoread)
set -g focus-events on

# start indexing at 1 (easier to reach)
set -g base-index 1
setw -g pane-base-index 1

# renumber windows when one closes
set -g renumber-windows on

# activity alerts in background windows
set -g monitor-activity on
set -g visual-activity off

# ── Key Bindings ─────────────────────────────────────────────

# reload config: prefix + r
bind r source-file ~/.tmux.conf \; display "Reloaded"

# navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# splits in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# IDE layout: prefix + C
# left 25% = claude code, top-right 75% = nvim, bottom-right 20% = terminal
bind C new-window -c "~/" \; \
  split-window -h -p 75 -c "~/" \; \
  split-window -v -p 20 -c "~/" \; \
  select-pane -t 0

# ── Theme (Catppuccin Mocha) ─────────────────────────────────

# status bar
set -g status-position top
set -g status-style 'bg=#1e1e2e fg=#cdd6f4'
set -g status-left-length 30
set -g status-right-length 80
set -g status-left '#[fg=#1e1e2e,bg=#a6e3a1,bold] #S #[default]   '
set -g status-right '#{?pane_in_mode,#[bg=#94e2d5 fg=#1e1e2e bold] COPY ,#[bg=#45475a fg=#cdd6f4 bold] NORMAL }#[default] #[fg=#6c7086]UTC #(TZ="UTC" date +%%H:%%M)  YVR #(TZ="America/Vancouver" date +%%I:%%M%%p)  #[fg=#cdd6f4]YYZ #(TZ="America/Toronto" date +%%I:%%M%%p) '

# window tabs
set -g window-status-current-style 'bg=#94e2d5 fg=#1e1e2e bold'
set -g window-status-current-format '#[fg=#1e1e2e,bg=#94e2d5] #I:#W #[fg=#94e2d5,bg=#1e1e2e]'
set -g window-status-style 'fg=#6c7086'
set -g window-status-format '#[fg=#1e1e2e,bg=#45475a] #I:#W #[fg=#45475a,bg=#1e1e2e]'
set -g window-status-separator ''
set -g window-status-activity-style 'fg=#f9e2af'

# panes
set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style 'fg=#94e2d5'
set -g window-style 'bg=#181825'
set -g window-active-style 'bg=#1e1e2e'

# message/command bar
set -g message-style 'bg=#f9e2af fg=#1e1e2e bold'

# copy mode selection highlight
set -g mode-style 'bg=#f9e2af fg=#1e1e2e'

# clock mode (prefix + t)
set -g clock-mode-colour '#94e2d5'
